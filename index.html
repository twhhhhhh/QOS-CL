<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>體驗QOS AR鏡頭</title>
    <style>
        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #111;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
        }
         section {
            padding: 40px;
            margin-bottom: 20px; /* 控制上下兩個 section 的間距 */
          }

        .ar-launch-btn {
            display: inline-block;
            padding: 20px 40px;
            font-size: 20px;
            color: white;
            background: linear-gradient(135deg, #007aff, #0051a8);
            text-decoration: none;
            border-radius: 50px;
            font-weight: bold;
            box-shadow: 0 10px 20px rgba(0,122,255,0.3);
        }

    </style>
</head>
<body>
    <section>
        <a rel="ar" href="my_model1.reality" class="ar-launch-btn">
        AR - Facal AR
        </a>
    </section>
    <br>
    <section>
        <a rel="ar" href="my_model2.reality" class="ar-launch-btn">
            AR - Dance with Pokemon
        </a>
    </section>
</body>
</html>
